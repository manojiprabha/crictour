<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Create Club</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f7fa;
padding:40px;
}

input,select{
padding:10px;
width:250px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0070f3;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Create Club Profile</h1>

<form id="clubForm">

<input
type="text"
name="clubName"
placeholder="Club Name"
required
/>

<br>

<input
type="text"
name="city"
placeholder="City"
required
/>

<br>

<select name="role">

<option value="Captain">Captain</option>
<option value="Vice Captain">Vice Captain</option>
<option value="Player">Player</option>
<option value="Manager">Manager</option>

</select>

<br>

<input
type="text"
name="playCricket"
placeholder="Play-Cricket URL"
/>

<br>

<button type="submit">
Create Club
</button>

</form>

<script>

const { createClient } = supabase;

const supabaseClient = createClient(
"https://kzhziquvehjuagmjgnri.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6aHppcXV2ZWhqdWFnbWpnbnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTkxNTgsImV4cCI6MjA4ODYzNTE1OH0.ctxzWUP0hii9NZpx5G2SAkfQRqWKfyA8t2UVXBahu-I"
);


// Check user login
async function checkUser(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
window.location.href="/";
}

}

checkUser();


document
.getElementById("clubForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const formData=new FormData(e.target);

const clubName=formData.get("clubName");
const city=formData.get("city");
const role=formData.get("role");
const playCricket=formData.get("playCricket");

const { data:userData } =
await supabaseClient.auth.getUser();

const user=userData.user;

const { error } =
await supabaseClient.from("clubs").insert({

club_name:clubName,
city:city,
play_cricket_url:playCricket,
created_by:user.id,
role:role

});

if(error){

alert(error.message);

}else{

alert("Club created successfully!");

window.location.href="/dashboard.html";

}

});

</script>

</body>

</html>
