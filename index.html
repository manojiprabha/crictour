<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CricTour</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family: Arial;
margin:0;

}

header{
background:#0a2540;
color:white;
padding:60px 20px;
}

h1{

}

.container{
padding:40px;
}

input{
padding:10px;

margin:6px;

}

button{
background:#0070f3;
color:white;
border:none;
padding:12px 25px;

<body>

<header>

<p>
Find Friendly Cricket Matches & Plan Club Tours
</p>

<button onclick="googleLogin()">
Sign in with Google
</button>

<br><br>

<button onclick="showEmailForm()">
Register with Email
</button>

</header>

<div class="container" id="emailForm" style="display:none">

<h2>Email Signup</h2>

<form id="signupForm">

<input
type="email"
placeholder="Email"
name="email"
required
/>

<br>

<input
type="password"
placeholder="Password"
name="password"
required
/>

<br>

<button type="submit">
Create Account
</button>

</form>

</div>

<script>

const supabase = window.supabase.createClient(
"https://kzhziquvehjuagmjgnri.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6aHppcXV2ZWhqdWFnbWpnbnJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNTkxNTgsImV4cCI6MjA4ODYzNTE1OH0.ctxzWUP0hii9NZpx5G2SAkfQRqWKfyA8t2UVXBahu-I"
);

async function googleLogin(){

const { data, error } =
await supabase.auth.signInWithOAuth({
provider:"google"
});

}

function showEmailForm(){
document.getElementById("emailForm").style.display="block";
}

document
.getElementById("signupForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const formData = new FormData(e.target);

const email=formData.get("email");
const password=formData.get("password");

const { data,error } =
await supabase.auth.signUp({
email:email,
password:password
});

if(error){

alert(error.message);

}else{

alert("Check your email for confirmation");

}

});

supabase.auth.onAuthStateChange((event,session)=>{

if(session){

window.location.href="/create-club.html";

}

});

</script>

</body>

</html>
